<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayatın Ritmi - Premium Kayıt Ekranı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #000000; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #ffffff; overflow: hidden; }
        
        /* Ortam Işıkları */
        .ambient-bg { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 15s infinite ease-in-out alternate; }
        .orb-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: #e11d48; }
        .orb-2 { bottom: -10%; right: -10%; width: 350px; height: 350px; background: #be123c; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        /* Cihaz Çerçevesi */
        .app-frame { width: 393px; height: 852px; background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(40px); border-radius: 50px; position: relative; z-index: 10; border: 8px solid #0a0a0a; display: flex; flex-direction: column; overflow: hidden; }

        /* Scrollbar Gizleme */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Premium Inputlar */
        .premium-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding: 12px 12px 12px 40px; color: white; font-size: 15px; font-weight: 500; transition: all 0.3s; }
        .premium-input:focus { outline: none; border-bottom-color: #e11d48; box-shadow: 0 1px 0 0 #e11d48; }
        .input-icon { position: absolute; left: 8px; top: 14px; color: rgba(255,255,255,0.4); font-size: 16px; }

        /* Özel Kan Grubu Seçici (Premium Select) */
        select.premium-input { 
            -webkit-appearance: none; appearance: none; 
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ffffff' stroke-opacity='0.4' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); 
            background-position: right 0px center; 
            background-repeat: no-repeat; 
            background-size: 1.5em 1.5em; 
        }
        select.premium-input option { background-color: #0f172a; color: white; }

        /* Cam Buton */
        .glass-btn { background: linear-gradient(135deg, #e11d48 0%, #be123c 100%); box-shadow: 0 10px 30px rgba(225, 29, 72, 0.3); border-radius: 16px; font-weight: 700; transition: transform 0.2s; }
        .glass-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="app-frame">
        
        <div class="w-full flex justify-between items-center px-8 pt-6 pb-2 text-xs font-semibold text-white/70">
            <span>9:41</span><div class="flex gap-2"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div>
        </div>

        <div class="flex-1 flex flex-col px-8 pb-10 pt-4 overflow-y-auto no-scrollbar">
            
            <button class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/60 hover:text-white transition-all mb-6">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <h1 class="text-3xl font-extrabold mb-2 leading-tight">Hayat Kurtarma<br>Profili Oluştur</h1>
            <p class="text-sm text-white/40 mb-8 font-medium">Bu veriler acil durumlarda ilk müdahale ekipleriyle şifreli olarak paylaşılacaktır.</p>

            <div class="space-y-6">

                <div class="relative">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" placeholder="Adınız ve Soyadınız" class="premium-input">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="relative">
                        <i class="fa-solid fa-droplet input-icon" style="color: #e11d48;"></i>
                        <select class="premium-input text-white/80" id="blood-group">
                            <option value="" disabled selected hidden>Kan Grubu</option>
                            <option>A Rh+</option><option>A Rh-</option>
                            <option>B Rh+</option><option>B Rh-</option>
                            <option>AB Rh+</option><option>AB Rh-</option>
                            <option>0 Rh+</option><option>0 Rh-</option>
                        </select>
                    </div>

                    <div class="relative">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" placeholder="Şifre Belirle" class="premium-input">
                    </div>
                </div>

                <div class="relative">
                    <i class="fa-solid fa-kit-medical input-icon"></i>
                    <input type="tel" placeholder="Acil Durum Kişisi (Tel No)" class="premium-input">
                </div>

                <div class="relative">
                    <i class="fa-solid fa-user-doctor input-icon"></i>
                    <span class="absolute right-0 top-3 text-[10px] uppercase tracking-wider text-white/30 font-bold border border-white/10 px-2 py-0.5 rounded-full">Opsiyonel</span>
                    <input type="email" placeholder="Doktorunuzun E-Postası" class="premium-input pr-20">
                </div>

            </div>

            <div class="flex gap-3 mt-8 mb-8 items-start">
                <input type="checkbox" class="mt-1 accent-rose-600 w-4 h-4 rounded border-gray-600 bg-transparent">
                <span class="text-xs text-white/50 leading-relaxed">
                    <a href="#" class="text-rose-500 hover:underline">Kullanım Koşullarını</a> ve tıbbi verilerimin uçtan uca şifrelenerek işlenmesine dair <a href="#" class="text-rose-500 hover:underline">KVKK Metnini</a> okudum, onaylıyorum.
                </span>
            </div>

            <button class="glass-btn w-full py-4 text-lg text-white flex items-center justify-center gap-3 mt-auto">
                Tişörtü Bağla <i class="fa-brands fa-bluetooth-b"></i>
            </button>

        </div>
    </div>

</body>
</html>
