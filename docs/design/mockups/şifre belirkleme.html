<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayatın Ritmi - Şifre Sıfırlama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #000000; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #ffffff; overflow: hidden; }
        
        /* Ortam Işıkları (Öncekiyle Aynı Konsept) */
        .ambient-bg { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 15s infinite ease-in-out alternate; }
        .orb-1 { top: -10%; left: -10%; width: 300px; height: 300px; background: #e11d48; }
        .orb-2 { bottom: -10%; right: -10%; width: 350px; height: 350px; background: #be123c; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        /* Cihaz Çerçevesi */
        .app-frame { width: 393px; height: 852px; background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(40px); border-radius: 50px; position: relative; z-index: 10; border: 8px solid #0a0a0a; display: flex; flex-direction: column; overflow: hidden; }

        /* Ekran Geçişleri */
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; position: absolute; inset: 0; z-index: 20; }
        .screen.active { display: flex; animation: slide-left 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slide-left { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Premium Input */
        .premium-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding: 12px 12px 12px 40px; color: white; font-size: 17px; font-weight: 500; transition: all 0.3s; }
        .premium-input:focus { outline: none; border-bottom-color: #e11d48; box-shadow: 0 1px 0 0 #e11d48; }
        .input-icon { position: absolute; left: 8px; top: 14px; color: rgba(255,255,255,0.4); font-size: 18px; }

        /* OTP Kutucukları (Şifre Kodu Girmek İçin) */
        .otp-input {
            width: 60px; height: 70px; font-size: 32px; font-weight: 700; text-align: center; color: white;
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
            transition: all 0.2s;
        }
        .otp-input:focus { outline: none; border-color: #e11d48; background: rgba(225, 29, 72, 0.05); box-shadow: 0 0 15px rgba(225, 29, 72, 0.2); }

        /* Cam Buton */
        .glass-btn { background: linear-gradient(135deg, #e11d48 0%, #be123c 100%); box-shadow: 0 10px 30px rgba(225, 29, 72, 0.3); border-radius: 16px; font-weight: 700; transition: transform 0.2s; }
        .glass-btn:active { transform: scale(0.96); }
        .glass-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="app-frame">
        
        <div class="w-full flex justify-between items-center px-8 pt-6 pb-2 text-xs font-semibold text-white/70">
            <span>9:41</span><div class="flex gap-2"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-battery-full"></i></div>
        </div>

        <div id="step-1" class="screen active px-8 pt-4 pb-12">
            <button class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/60 hover:text-white transition-all mb-8">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <i class="fa-solid fa-shield-halved text-5xl text-rose-500 mb-6 drop-shadow-[0_0_15px_rgba(225,29,72,0.6)]"></i>
            <h1 class="text-3xl font-extrabold mb-3">Şifremi Unuttum</h1>
            <p class="text-sm text-white/50 mb-10 leading-relaxed font-medium">Hesabınıza kayıtlı telefon numarasını girin. Size 4 haneli bir güvenlik kodu göndereceğiz.</p>

            <div class="relative mb-12">
                <i class="fa-solid fa-phone input-icon"></i>
                <input type="tel" placeholder="05XX XXX XX XX" class="premium-input" id="phone-input">
            </div>

            <button onclick="sendCode()" class="glass-btn w-full py-4 text-lg text-white flex items-center justify-center gap-3 mt-auto">
                Kodu Gönder <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <div id="step-2" class="screen px-8 pt-4 pb-12">
            <button onclick="goBack()" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/60 transition-all mb-8">
                <i class="fa-solid fa-arrow-left"></i>
            </button>

            <h1 class="text-3xl font-extrabold mb-3">Kodu Girin</h1>
            <p class="text-sm text-white/50 mb-10 leading-relaxed font-medium">Telefonunuza gönderilen 4 haneli doğrulama kodunu girin.</p>

            <div class="flex justify-between w-full mb-8">
                <input type="text" maxlength="1" class="otp-input" autofocus>
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
                <input type="text" maxlength="1" class="otp-input">
            </div>

            <div class="flex justify-center text-sm font-medium text-white/40 mb-12">
                Kodu almadınız mı? <span class="text-rose-500 font-bold ml-1 cursor-pointer">Tekrar Gönder (0:59)</span>
            </div>

            <button onclick="alert('Yeni Şifre Belirleme Ekranına Geçiliyor...')" class="glass-btn w-full py-4 text-lg text-white flex items-center justify-center mt-auto">
                Doğrula
            </button>
        </div>

    </div>

    <script>
        function sendCode() {
            // Butona basıldığında animasyonlu bir şekilde OTP ekranına geçer
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            
            // İlk kutucuğa otomatik odaklanma (UX için çok önemli)
            setTimeout(() => document.querySelectorAll('.otp-input')[0].focus(), 100);
        }

        function goBack() {
            // Geri dönme fonksiyonu
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
        }

        // OTP Kutucukları Arası Otomatik Atlama Simülasyonu
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus(); // Sonraki kutuya atla
                }
            });
            // Silme (Backspace) tuşuna basınca bir önceki kutuya dönme
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>
</html>
