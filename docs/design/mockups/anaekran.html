<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayatın Ritmi - Calm Tech Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #000000; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #ffffff; overflow: hidden; }

        /* Ortam Işıkları (Bu sefer Kırmızı/Alarm yok. Huzur veren Zümrüt Yeşili ve Mavi) */
        .ambient-bg { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3; animation: float 15s infinite ease-in-out alternate; }
        .orb-1 { top: 0%; left: -20%; width: 400px; height: 400px; background: #10b981; } /* Emerald */
        .orb-2 { bottom: 0%; right: -20%; width: 400px; height: 400px; background: #3b82f6; animation-delay: -5s; } /* Blue */
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 30px); } }

        /* Cihaz Çerçevesi */
        .app-frame { width: 393px; height: 852px; background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(40px); border-radius: 50px; position: relative; z-index: 10; border: 8px solid #0a0a0a; display: flex; flex-direction: column; overflow: hidden; }

        /* Nefes Alan Daire (Sürekli değişen sayılar yerine huzurlu animasyon) */
        .breathing-circle {
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, rgba(16, 185, 129, 0) 70%);
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: breathe 4s ease-in-out infinite;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.1);
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); border-color: rgba(16, 185, 129, 0.3); } 50% { transform: scale(1.05); border-color: rgba(16, 185, 129, 0.8); box-shadow: 0 0 60px rgba(16, 185, 129, 0.2); } }

        /* Cam Kartlar */
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px); border-radius: 24px; transition: all 0.3s; }
        .glass-card:active { transform: scale(0.97); }

        /* Yüzen Navigasyon */
        .floating-nav { position: absolute; bottom: 30px; left: 24px; right: 24px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 16px 24px; display: flex; justify-content: space-between; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .nav-item { color: rgba(255,255,255,0.4); font-size: 20px; transition: all 0.3s; cursor: pointer; }
        .nav-item.active { color: #10b981; filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.6)); }

    </style>
</head>
<body>

    <div class="ambient-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="app-frame">

        <div class="w-full flex justify-between items-center px-8 pt-6 pb-2 text-xs font-semibold text-white/70">
            <span>9:41</span><div class="flex gap-2"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-battery-full"></i></div>
        </div>

        <div class="px-8 pt-4 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-extrabold text-white">Merhaba, Ahmet</h2>
                <div class="flex items-center gap-2 mt-1">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <p class="text-white/50 text-xs font-bold tracking-wider uppercase">Tişört Bağlı</p>
                </div>
            </div>
            <div class="w-10 h-10 rounded-full border border-white/20 bg-slate-800 flex items-center justify-center">
                <i class="fa-solid fa-user text-white/70"></i>
            </div>
        </div>

        <div class="w-full flex justify-center mt-12 mb-8">
            <div class="breathing-circle">
                <i class="fa-solid fa-shield-heart text-5xl text-emerald-400 mb-3 drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]"></i>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Güvendesiniz</h1>
                <p class="text-sm font-medium text-emerald-400/80 mt-1">Kalp ritminiz stabil.</p>
            </div>
        </div>

        <div class="px-8 mb-6">
            <div class="glass-card p-5">
                <div class="flex items-center gap-3 mb-2">
                    <i class="fa-solid fa-wand-magic-sparkles text-blue-400"></i>
                    <h3 class="font-bold text-sm text-white">Yapay Zeka Notu</h3>
                </div>
                <p class="text-sm text-white/70 leading-relaxed font-medium">
                    Bugün gayet iyi görünüyorsunuz. Düne göre stresiniz azaldı. İlacınızı aldıysanız günün tadını çıkarabilirsiniz.
                </p>
            </div>
        </div>

        <div class="px-8">
            <div onclick="alert('Buraya basınca detaylı EKG grafikleri ve PDF indirme sayfası açılacak.')" class="glass-card p-5 cursor-pointer hover:bg-white/10 flex items-center justify-between border-l-4 border-l-blue-500">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center">
                        <i class="fa-solid fa-chart-pie text-blue-500 text-lg"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-sm text-white">Detaylı Rapor & EKG</h4>
                        <p class="text-xs text-white/50 mt-1">Doktorunuz için teknik veriler</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-white/30"></i>
            </div>
        </div>

        <div class="floating-nav">
            <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-solid fa-file-pdf"></i></div>
            <div class="nav-item"><i class="fa-solid fa-bell"></i></div>
            <div class="nav-item"><i class="fa-solid fa-gear"></i></div>
        </div>

    </div>

</body>
</html>
